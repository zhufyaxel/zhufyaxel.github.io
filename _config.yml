# SITE CONFIGURATION
baseurl: ""
url: ""
title: FY's Dev Blog # site's title
description: "FY's developer blog for daily logs" # used by search engines


# THEME-SPECIFIC CONFIGURATION
theme_settings:
  # Meta
  title: FY's Dev Blog # blog's title
  avatar: assets/img/triangle.svg
  favicon: assets/favicon.ico
  gravatar: # Email MD5 hash

  # Header and footer text
  header_text: > #two or three lines to describe your site
     <p> This is a personal blog for personal development works and some articles <br> Welcome and have fun here</p>
  header_text_feature_image: assets/img/pexels/triangular.jpeg
  footer_text: >
   Feel free to contact me if anything is needed. Email: zhufyaxel[at]gmail.com

  # Icons
  rss: true  # Make sure you created a feed.xml with feed.xml layout
  email_address: # Full email address, e.g. "sam@example.com"
  behance:
  bitbucket:
  dribbble:
  facebook:
  flickr:
  gitlab:
  github: "zhufyaxel"
  google_plus:
  instagram:
  keybase:
  linkedin:  # Full URL
  pinterest:
  reddit:
  soundcloud:
  stack_exchange:  # Full URL
  steam:
  tumblr:
  twitter: # "twitter username"
  vimeo:
  wordpress:
  youtube:

  # Scripts / Features
  google_analytics: # Tracking ID, e.g. "UA-000000-01"
  disqus_shortname:
  katex: true # Enable if using math markup
  portfolio: false
  search: true
  tags: true

  # Localization strings
  str_follow_on: "Follow on"
  str_rss_follow: "Follow RSS feed"
  str_email: "zhufyaxel@gmail.com"
  str_next_post: "Next post"
  str_previous_post: "Previous post"
  str_next_page: "Next"
  str_previous_page: "Prev"
  str_continue_reading: "Continue reading"
  str_javascript_required_disqus: "Please enable JavaScript to view comments."

  # Colours, typography and padding
  # Open the "_sass > base" folder, and open "_variables.scss"
  #google_fonts: "Source+Sans+Pro:400,700,700italic,400italic"

  # Post navigation
  post_navigation: true


# PAGINATION
paginate: 5
paginate_path: "blog/page:num"


# PORTFOLIO
collections:
  portfolio:
    output: true
    permalink: /:collection/:name


# BUILD SETTINGS
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: :compressed
plugins: [jekyll-paginate, jekyll-seo-tag]
#theme: type-on-strap # Uncomment if using the theme as a jekyll theme gem
exclude: ["Gemfile", "Gemfile.lock", "type-on-strap.gemspec", "*.gem", "LICENSE", "README.md", "screenshot.png"]

defaults:
  -
    scope:
      path:  "_posts/Unity"
    values:
      tags: [Selflearning, Unity]
      feature-img: "assets/img/CommonUsage/unity.jpg"
      thumbnail: "assets/img/CommonUsage/unity.jpg"
  -
    scope:
      path:  "_posts/Others"
    values:
      tags: [Selflearning, others]
      feature-img: "assets/img/CommonUsage/Coding.jpg"
      thumbnail: "assets/img/CommonUsage/Coding.jpg"
  -
    scope:
      path:  "_posts/Python"
    values:
      tags: [Selflearning, python]
      feature-img: "assets/img/CommonUsage/python.png"
      thumbnail: "assets/img/CommonUsage/python.png"
  