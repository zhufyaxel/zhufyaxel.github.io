<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | DAGVisualizer</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>  
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/WebGL.json", {onProgress: UnityProgress});
    </script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer" style="width: 960px; height: 600px"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
        <div class="title">ConfluxVisualizer</div>
        <div class="instructor">                   </div>
        <div class="instructor">Manual: RightClick + Drag = Pan</div>
        <div class="instructor">Mouse Scroll = Zoom</div>
        <div class="instructor">LeftClick On Node = Get certain info on a Node</div>
        <div class="instructor">AutoGeneration is totally random</div>
        <div class="instructor">But easy to modify if we have the data, as the project is on a well Model-View-Controll Design</div>
      </div>
    </div>
  </body>
</html>
